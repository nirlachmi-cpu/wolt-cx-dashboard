<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Wolt Market IL — CX Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Nunito',-apple-system,Arial,sans-serif;}
body{background:#f5f5f7;color:#1d1d1f;font-size:13px;min-height:100vh;}

/* LAYOUT */
.page{max-width:960px;margin:0 auto;padding:36px 20px 60px;}
.section{margin-bottom:12px;}
.card{background:#fff;border-radius:14px;padding:20px 20px;}
.card-sm{background:#fff;border-radius:14px;padding:16px 18px;}

/* HEADER */
.header{padding:0 0 24px;}
.header-label{font-size:9px;font-weight:500;color:#aeaeb2;text-transform:uppercase;letter-spacing:.18em;margin-bottom:6px;}
.header-title{font-size:26px;font-weight:700;color:#c8930a;letter-spacing:-.3px;line-height:1.1;}
.header-sub{font-size:12px;color:#c7c7cc;font-weight:400;margin-top:5px;}

/* FILTERS */
.filters-bar{background:#fff;border-radius:14px;padding:16px 18px;margin-bottom:12px;}
.filter-label{font-size:9px;font-weight:500;color:#aeaeb2;text-transform:uppercase;letter-spacing:.18em;margin-bottom:10px;}
.week-tabs{display:flex;gap:6px;margin-bottom:14px;}
.week-tab{padding:6px 14px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:none;background:#f2f2f7;color:#6e6e73;transition:all .15s;}
.week-tab.active{background:#1d1d1f;color:#fff;}
.venue-chips-wrap{display:flex;flex-wrap:wrap;gap:6px;align-items:center;}
.chip{padding:5px 12px;border-radius:20px;font-size:10.5px;font-weight:500;cursor:pointer;border:1.5px solid #e5e5ea;background:#fff;color:#3a3a3c;transition:all .15s;white-space:nowrap;}
.chip:hover{border-color:#aeaeb2;}
.chip.active{background:#1d1d1f;color:#fff;border-color:#1d1d1f;}
.chip-all{background:#f2f2f7;border-color:#f2f2f7;color:#6e6e73;}
.chip-all.active{background:#1d1d1f;color:#fff;border-color:#1d1d1f;}
.filter-toggle{font-size:10px;font-weight:500;color:#007aff;cursor:pointer;padding:5px 12px;background:#f0f6ff;border-radius:20px;border:none;white-space:nowrap;}

/* KPI CARDS */
.kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:12px;}
.kpi-card{background:#fff;border-radius:14px;padding:16px 12px;text-align:center;}
.kpi-val{font-size:22px;font-weight:600;color:#1d1d1f;line-height:1;}
.kpi-val.bad{color:#ff3b30;}
.kpi-badge{display:inline-block;border-radius:20px;padding:2px 8px;font-size:9px;font-weight:600;margin:6px 0 3px;}
.badge-green{background:#f4fef6;color:#34c759;}
.badge-red{background:#fff4f3;color:#ff3b30;}
.badge-gray{background:#f2f2f7;color:#6e6e73;}
.kpi-target{font-size:8.5px;font-weight:400;color:#c7c7cc;margin-bottom:2px;}
.kpi-label{font-size:9px;font-weight:500;color:#aeaeb2;text-transform:uppercase;letter-spacing:.06em;}

/* CHARTS */
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.chart-title{font-size:9px;font-weight:500;color:#aeaeb2;text-transform:uppercase;letter-spacing:.16em;margin-bottom:14px;}
canvas{max-height:240px;}

/* MOVERS */
.movers-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.mover-label{font-size:9.5px;font-weight:600;margin-bottom:8px;}
.mover-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid #f5f5f7;font-size:11px;}
.mover-row:last-child{border-bottom:none;}
.mover-venue{color:#3a3a3c;font-weight:400;}
.mover-val-up{color:#34c759;font-weight:600;white-space:nowrap;}
.mover-val-dn{color:#ff3b30;font-weight:600;white-space:nowrap;}

/* HIGH RISK */
.risk-item{padding:12px 0;border-bottom:1px solid #f2f2f7;}
.risk-item:last-child{border-bottom:none;}
.risk-name{font-size:12.5px;font-weight:600;color:#1d1d1f;}
.risk-meta{font-size:10.5px;font-weight:400;color:#6e6e73;margin-top:3px;}
.risk-cx{font-size:10.5px;font-weight:400;color:#aeaeb2;margin-top:2px;}

/* COMPLAINTS */
.complaint-row{padding:8px 0;border-bottom:1px solid #f2f2f7;}
.complaint-row:last-child{border-bottom:none;}
.complaint-head{display:flex;justify-content:space-between;align-items:center;}
.complaint-name{font-size:11.5px;font-weight:500;color:#1d1d1f;}
.complaint-venues{font-size:10px;font-weight:400;color:#aeaeb2;margin-top:4px;line-height:1.6;}
.pill{border-radius:20px;padding:2px 9px;font-size:9.5px;font-weight:600;}
.pill-orange{background:#fff3e0;color:#ff9500;}
.pill-red{background:#fff4f3;color:#ff3b30;}
.pill-blue{background:#f0f6ff;color:#007aff;}
.pill-gray{background:#f2f2f7;color:#6e6e73;}

/* ALSO WATCH */
.watch-card{background:#fffbeb;border-radius:14px;padding:16px 18px;border:1px solid #fde68a;margin-bottom:12px;}
.watch-label{font-size:9px;font-weight:500;color:#f5a623;text-transform:uppercase;letter-spacing:.18em;margin-bottom:10px;}
.watch-item{font-size:11.5px;font-weight:400;color:#6e6e73;line-height:2;}

/* POFR TABLE */
.pofr-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0;}
.pofr-row{display:flex;justify-content:space-between;align-items:center;padding:5px 6px;font-size:11px;border-radius:6px;}
.pofr-row:hover{background:#f9f9fb;}
.pofr-venue{color:#3a3a3c;font-weight:400;}
.pofr-bar-wrap{flex:1;margin:0 8px;height:4px;background:#f2f2f7;border-radius:2px;overflow:hidden;}
.pofr-bar{height:100%;border-radius:2px;transition:width .3s;}
.pofr-pct{font-size:10.5px;font-weight:600;min-width:36px;text-align:right;}
.bar-good{background:#34c759;}
.bar-warn{background:#ff9500;}
.bar-bad{background:#ff3b30;}
.pct-good{color:#34c759;}
.pct-warn{color:#ff9500;}
.pct-bad{color:#ff3b30;}

/* FOOTER */
.footer{text-align:center;font-size:10px;font-weight:400;color:#c7c7cc;margin-top:20px;}

/* NO DATA */
.no-data{text-align:center;padding:28px;color:#c7c7cc;font-size:12px;}

@media(max-width:600px){
  .kpi-grid{grid-template-columns:repeat(3,1fr);}
  .charts-grid,.movers-grid{grid-template-columns:1fr;}
  .pofr-grid{grid-template-columns:1fr 1fr;}
}
</style>
</head>
<body>
<div class="page">

<!-- HEADER -->
<div class="header">
  <div class="header-label">Wolt Market Israel</div>
  <div class="header-title">Weekly CX Dashboard</div>
  <div class="header-sub" id="headerSub">June 22, 2026 &nbsp;&middot;&nbsp; 30 stores</div>
</div>

<!-- FILTERS -->
<div class="filters-bar section">
  <div class="filter-label">Week</div>
  <div class="week-tabs">
    <button class="week-tab active" onclick="setWeek('jun22')">W/E June 22</button>
    <button class="week-tab" onclick="setWeek('jun15')">W/E June 15</button>
  </div>
  <div class="filter-label">Venues <span id="venueCount" style="font-weight:400;text-transform:none;letter-spacing:0;font-size:9px;color:#c7c7cc;">— all selected</span></div>
  <div class="venue-chips-wrap" id="venueChips"></div>
  <div style="margin-top:10px;display:flex;gap:8px;align-items:center;">
    <button class="filter-toggle" onclick="selectAll()">Select All</button>
    <button class="filter-toggle" onclick="clearAll()">Clear All</button>
    <span id="venueFilterNote" style="font-size:10px;color:#aeaeb2;"></span>
  </div>
</div>

<!-- KPIs -->
<div class="kpi-grid section" id="kpiGrid"></div>

<!-- CHARTS -->
<div class="charts-grid section">
  <div class="card-sm">
    <div class="chart-title">POFR by Venue</div>
    <canvas id="pofrChart"></canvas>
  </div>
  <div class="card-sm">
    <div class="chart-title">Goods Rating by Venue</div>
    <canvas id="ratingChart"></canvas>
  </div>
</div>

<!-- MOVERS + HIGH RISK -->
<div class="movers-grid section">
  <div class="card-sm">
    <div class="chart-title">Biggest Movers</div>
    <div id="moversContent"></div>
  </div>
  <div class="card-sm">
    <div class="chart-title">High Risk Stores</div>
    <div id="riskContent"></div>
  </div>
</div>

<!-- ALSO WATCH -->
<div class="watch-card section" id="watchCard">
  <div class="watch-label">Also Watch</div>
  <div id="watchContent"></div>
</div>

<!-- POFR FULL TABLE -->
<div class="card section">
  <div class="chart-title" style="margin-bottom:16px;">POFR — All Venues</div>
  <div class="pofr-grid" id="pofrTable"></div>
</div>

<!-- COMPLAINTS -->
<div class="card section">
  <div class="chart-title" style="margin-bottom:3px;">Customer Complaint Themes</div>
  <div style="font-size:10px;font-weight:400;color:#c7c7cc;margin-bottom:14px;" id="complaintSub"></div>
  <div id="complaintsContent"></div>
</div>

<div class="footer" id="footer">Wolt Market Israel &nbsp;&middot;&nbsp; Nir Lachmi &nbsp;&middot;&nbsp; June 2026</div>
</div>

// ─── STATE ───────────────────────────────────────────────────────────────────
let currentWeek = 'jun22';
let selectedVenues = new Set(); // empty = all
let pofrChartInst = null;
let ratingChartInst = null;

const allVenues = Object.keys(WEEKS.jun22.pofr).sort();

// ─── INIT ─────────────────────────────────────────────────────────────────────
function init() {
  buildVenueChips();
  render();
}

function buildVenueChips() {
  const wrap = document.getElementById('venueChips');
  wrap.innerHTML = '';
  allVenues.forEach(v => {
    const chip = document.createElement('button');
    chip.className = 'chip';
    chip.textContent = v;
    chip.dataset.venue = v;
    chip.onclick = () => toggleVenue(v);
    wrap.appendChild(chip);
  });
}

function toggleVenue(v) {
  if (selectedVenues.has(v)) selectedVenues.delete(v);
  else selectedVenues.add(v);
  updateChipState();
  render();
}

function selectAll() {
  selectedVenues.clear();
  updateChipState();
  render();
}

function clearAll() {
  allVenues.forEach(v => selectedVenues.add(v));
  // Actually keep at least one
  if (selectedVenues.size === allVenues.length) selectedVenues.clear();
  updateChipState();
  render();
}

function updateChipState() {
  const chips = document.querySelectorAll('.chip[data-venue]');
  chips.forEach(c => {
    c.classList.toggle('active', selectedVenues.has(c.dataset.venue));
  });
  const count = selectedVenues.size;
  const note = document.getElementById('venueCount');
  const filterNote = document.getElementById('venueFilterNote');
  if (count === 0) {
    note.textContent = '— all selected';
    filterNote.textContent = '';
  } else {
    note.textContent = `— ${count} selected`;
    filterNote.textContent = `Showing ${count} venue${count>1?'s':''}`;
  }
}

function setWeek(w) {
  currentWeek = w;
  document.querySelectorAll('.week-tab').forEach((t,i) => {
    t.classList.toggle('active', (i===0 && w==='jun22') || (i===1 && w==='jun15'));
  });
  render();
}

function getActiveVenues() {
  return selectedVenues.size === 0 ? allVenues : [...selectedVenues];
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function render() {
  const wk = WEEKS[currentWeek];
  const venues = getActiveVenues();
  
  document.getElementById('headerSub').innerHTML = wk.sub.replace('·','&middot;').replace('·','&middot;');

  renderKPIs(wk, venues);
  renderPofrChart(wk, venues);
  renderRatingChart(wk, venues);
  renderMovers(wk, venues);
  renderRisk(wk, venues);
  renderWatch(wk, venues);
  renderPofrTable(wk, venues);
  renderComplaints(wk, venues);
}

function renderKPIs(wk, venues) {
  const grid = document.getElementById('kpiGrid');
  const k = wk.kpi;

  // If filtered to specific venues, show aggregate POFR/Rating for those venues
  let pofrVal = k.pofr.val, pofrBadge = k.pofr.badge, pofrDir = k.pofr.dir;
  let ratingVal = k.rating.val;

  if (selectedVenues.size > 0) {
    const pofrVals = venues.map(v => wk.pofr[v]).filter(x => x != null);
    if (pofrVals.length) {
      const avg = (pofrVals.reduce((a,b)=>a+b,0)/pofrVals.length).toFixed(1);
      pofrVal = avg + '%';
      pofrBadge = venues.length + ' venues';
      pofrDir = 'up';
    }
    const ratingVals = venues.map(v => wk.ratings[v]).filter(x => x != null);
    if (ratingVals.length) {
      ratingVal = (ratingVals.reduce((a,b)=>a+b,0)/ratingVals.length).toFixed(2);
    }
  }

  const kpis = [
    {label:'Orders', val:k.orders.val, badge:k.orders.badge, dir:k.orders.dir},
    {label:'Rating', val:ratingVal, badge:k.rating.badge, dir:k.rating.dir, target:k.rating.target},
    {label:'Avg ADT', val:k.adt.val, badge:k.adt.badge, dir:k.adt.dir, target:k.adt.target},
    {label:'POFR', val:pofrVal, badge:pofrBadge, dir:pofrDir, target:k.pofr.target},
    {label:'Settlements', val:k.settle.val, badge:k.settle.badge, dir:k.settle.dir, target:k.settle.target},
  ];

  grid.innerHTML = kpis.map(k => `
    <div class="kpi-card">
      <div class="kpi-val${k.label==='POFR'&&parseFloat(k.val)<90?' bad':''}">${k.val}</div>
      <div><span class="kpi-badge ${k.dir==='up'?'badge-green':'badge-red'}">${k.badge}</span></div>
      ${k.target ? `<div class="kpi-target">${k.target}</div>` : ''}
      <div class="kpi-label">${k.label}</div>
    </div>
  `).join('');
}

function renderPofrChart(wk, venues) {
  const ctx = document.getElementById('pofrChart').getContext('2d');
  if (pofrChartInst) pofrChartInst.destroy();

  const sorted = venues
    .map(v => ({ v, val: wk.pofr[v] || 0 }))
    .filter(x => x.val > 0)
    .sort((a,b) => a.val - b.val);

  const labels = sorted.map(x => x.v);
  const data = sorted.map(x => x.val);
  const colors = data.map(v => v >= 92 ? '#34c759' : v >= 88 ? '#ff9500' : '#ff3b30');

  pofrChartInst = new Chart(ctx, {
    type: 'bar',
    data: { labels, datasets: [{ data, backgroundColor: colors, borderRadius: 4, borderSkipped: false }] },
    options: {
      indexAxis: 'y',
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: {
        callbacks: { label: ctx => ` ${ctx.raw.toFixed(1)}%` }
      }},
      scales: {
        x: { min: 80, max: 100, ticks: { font:{family:'Nunito',size:9}, color:'#aeaeb2', callback: v=>v+'%' }, grid: { color:'#f5f5f7' } },
        y: { ticks: { font:{family:'Nunito',size:9}, color:'#3a3a3c' }, grid: { display:false } }
      }
    }
  });

  // Adjust canvas height dynamically
  document.getElementById('pofrChart').style.maxHeight = Math.max(180, sorted.length * 20) + 'px';
}

function renderRatingChart(wk, venues) {
  const ctx = document.getElementById('ratingChart').getContext('2d');
  if (ratingChartInst) ratingChartInst.destroy();

  const sorted = venues
    .map(v => ({ v, val: wk.ratings[v] || 0 }))
    .filter(x => x.val > 0)
    .sort((a,b) => b.val - a.val)
    .slice(0, 20);

  const labels = sorted.map(x => x.v);
  const data = sorted.map(x => x.val);
  const colors = data.map(v => v >= 4.65 ? '#34c759' : v >= 4.50 ? '#007aff' : v >= 4.35 ? '#ff9500' : '#ff3b30');

  ratingChartInst = new Chart(ctx, {
    type: 'bar',
    data: { labels, datasets: [{ data, backgroundColor: colors, borderRadius: 4, borderSkipped: false }] },
    options: {
      indexAxis: 'y',
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: {
        callbacks: { label: ctx => ` ${ctx.raw.toFixed(2)}` }
      }},
      scales: {
        x: { min: 4.0, max: 5.0, ticks: { font:{family:'Nunito',size:9}, color:'#aeaeb2' }, grid: { color:'#f5f5f7' } },
        y: { ticks: { font:{family:'Nunito',size:9}, color:'#3a3a3c' }, grid: { display:false } }
      }
    }
  });

  document.getElementById('ratingChart').style.maxHeight = Math.max(180, sorted.length * 20) + 'px';
}

function renderMovers(wk, venues) {
  const el = document.getElementById('moversContent');
  if (!wk.movers.up.length) {
    el.innerHTML = '<div class="no-data">No comparison data for this week</div>'; return;
  }

  const up = wk.movers.up.filter(m => selectedVenues.size===0 || venues.some(v => m.venue.includes(v)));
  const dn = wk.movers.dn.filter(m => selectedVenues.size===0 || venues.some(v => m.venue.includes(v)));

  el.innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
      <div>
        <div class="mover-label" style="color:#34c759;">▲ Improved</div>
        ${(up.length?up:wk.movers.up).map(m=>`
          <div class="mover-row">
            <span class="mover-venue">${m.venue}</span>
            <span class="mover-val-up">${m.val}</span>
          </div>`).join('')}
      </div>
      <div>
        <div class="mover-label" style="color:#ff3b30;">▼ Declined</div>
        ${(dn.length?dn:wk.movers.dn).map(m=>`
          <div class="mover-row">
            <span class="mover-venue">${m.venue}</span>
            <span class="mover-val-dn">${m.val}</span>
          </div>`).join('')}
      </div>
    </div>`;
}

function renderRisk(wk, venues) {
  const el = document.getElementById('riskContent');
  const items = selectedVenues.size === 0
    ? wk.risk
    : wk.risk.filter(r => venues.some(v => r.name.includes(v)));

  if (!items.length) {
    el.innerHTML = '<div class="no-data">No high risk stores in selection</div>'; return;
  }

  el.innerHTML = items.map(r => `
    <div class="risk-item">
      <div class="risk-name">${r.name}</div>
      <div class="risk-meta">${r.meta}</div>
      <div class="risk-cx" style="${r.alert?'color:#ff3b30;':''}">${r.cx}</div>
    </div>`).join('');
}

function renderWatch(wk, venues) {
  const el = document.getElementById('watchContent');
  const card = document.getElementById('watchCard');
  const items = selectedVenues.size === 0
    ? wk.watch
    : wk.watch.filter(w => venues.some(v => w.venue.includes(v)));

  if (!items.length) { card.style.display='none'; return; }
  card.style.display='';
  el.innerHTML = items.map(w => `
    <div class="watch-item">
      <strong style="color:#1d1d1f;">${w.venue}</strong> &mdash; ${w.text}
    </div>`).join('');
}

function renderPofrTable(wk, venues) {
  const el = document.getElementById('pofrTable');
  const sorted = venues
    .map(v => ({ v, val: wk.pofr[v] || 0 }))
    .filter(x => x.val > 0)
    .sort((a,b) => b.val - a.val);

  el.innerHTML = sorted.map(({ v, val }) => {
    const cls = val >= 92 ? 'bar-good pct-good' : val >= 88 ? 'bar-warn pct-warn' : 'bar-bad pct-bad';
    const barCls = val >= 92 ? 'bar-good' : val >= 88 ? 'bar-warn' : 'bar-bad';
    const pctCls = val >= 92 ? 'pct-good' : val >= 88 ? 'pct-warn' : 'pct-bad';
    const w = ((val - 80) / 20 * 100).toFixed(1);
    return `
      <div class="pofr-row">
        <span class="pofr-venue" style="min-width:110px;">${v}</span>
        <div class="pofr-bar-wrap"><div class="pofr-bar ${barCls}" style="width:${w}%"></div></div>
        <span class="pofr-pct ${pctCls}">${val.toFixed(1)}%</span>
      </div>`;
  }).join('');
}

function renderComplaints(wk, venues) {
  const el = document.getElementById('complaintsContent');
  const sub = document.getElementById('complaintSub');
  sub.textContent = `${wk.totalComments} store-actionable comments · ${wk.label}`;

  const items = selectedVenues.size === 0
    ? wk.complaints
    : wk.complaints.map(c => {
        const filteredVenues = c.venues.split(' · ').filter(vv => venues.some(v => vv.includes(v)));
        if (!filteredVenues.length) return null;
        return { ...c, venues: filteredVenues.join(' · ') };
      }).filter(Boolean);

  if (!items.length) {
    el.innerHTML = '<div class="no-data">No complaints data for selection</div>'; return;
  }

  el.innerHTML = items.map(c => `
    <div class="complaint-row">
      <div class="complaint-head">
        <span class="complaint-name">${c.name}</span>
        <span class="pill ${c.cls}">${c.count}</span>
      </div>
      <div class="complaint-venues">${c.venues}</div>
    </div>`).join('');
}

init();
</script>
</body>
</html>
